name: bounty-auto-merge

# Self-serve demo: when a PR is opened with a Hedera account in its body, label
# it for the bounty and auto-merge. The merge fires the github-pay webhook, which
# pays the contributor 10 HBAR (capped at 10/contributor, 500/month). The wait
# lets the contributor's IDENTITIES registration index on the Hedera mirror node
# before payment.

on:
  pull_request:
    types: [opened, reopened, edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  bounty:
    runs-on: ubuntu-latest
    steps:
      - name: Check for a Hedera account in the PR body
        id: check
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$BODY" | grep -qE '0\.0\.[0-9]+'; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ask for an account if missing
        if: steps.check.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body \
            "👋 Add your Hedera **testnet** account (\`0.0.xxxx\`) to the PR description, then edit the PR — the bot will pay you 10 HBAR."

      - name: Label the bounty
        if: steps.check.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr edit "$PR" --repo "$REPO" --add-label bounty-10

      - name: Wait for IDENTITIES to index on the Hedera mirror node
        if: steps.check.outputs.ok == 'true'
        run: sleep 25

      - name: Auto-merge (triggers the payment)
        if: steps.check.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR" --repo "$REPO" --squash --admin
